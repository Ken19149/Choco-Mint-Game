<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choco-Mint Canvas</title>
    <style>
        body {
            background-color: #fdf6e3; /* Soft warm background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            color: #4a3b32; /* Chocolate brown text */
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }
        input {
            width: 80%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #a8e6cf; /* Pastel mint border */
            border-radius: 15px;
            font-size: 18px;
            text-align: center;
            outline: none;
        }
        button {
            background-color: #a8e6cf; /* Pastel mint */
            color: #4a3b32;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        #gameScreen {
            display: none; /* Hidden until they log in */
        }
        canvas {
            -webkit-touch-callout: none; /* Disables the iOS long-press popup */
            -webkit-user-select: none;   /* Disables text selection on Safari */
            user-select: none;           /* Disables text selection everywhere else */
            touch-action: none;          /* Stops the browser from scrolling when you tap */
        }
        #canvasWrapper {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }
        #fxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none; /* Crucial: Lets taps pass through to the main canvas */
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="container">
        <h2>Join the Canvas</h2>
        <p>Help us map the flavor.</p>
        <input type="text" id="usernameInput" placeholder="Enter your name..." autocomplete="off">
        <br>
        <button onclick="joinGame()">Enter</button>
    </div>

    <div id="gameScreen" class="container">
        <h2 id="welcomeMsg">Waiting for assignment...</h2>
        <div id="playerStats"></div>
        <div id="canvasWrapper"></div>

        <button id="nextSectorBtn" style="display: none; width: 100%; margin-top: 20px; background-color: #56b896; color: white;">Get Next Sector!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let mySector = null;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let cellSize = 50; // We will calculate this dynamically now
        
        const fxCanvas = document.createElement('canvas');
        fxCanvas.id = "fxCanvas";
        const fxCtx = fxCanvas.getContext('2d');
        let particles = [];

        // 3. Make the cancellation bulletproof
        function cancelMintHold() {
            clearInterval(activeInterval);
            activeInterval = null; // THE FIX: Reset the lock
            
            if (activeMintCell) {
                drawMintProgress(activeMintCell.x, activeMintCell.y, mintProgress[activeMintCell.key], false);
                activeMintCell = null;
            }
        }
        
        // Cancel if they lift up, drag out of the canvas, or if the OS interrupts
        canvas.addEventListener('pointerup', cancelMintHold);
        canvas.addEventListener('pointerout', cancelMintHold);
        canvas.addEventListener('pointercancel', cancelMintHold);

        function joinGame() {
            const username = document.getElementById('usernameInput').value.trim();
            if (username === '') return;

            socket.emit('player_join', username);

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = `Joining...`;
            
            // Append both canvases to the wrapper
            const wrapper = document.getElementById('canvasWrapper');
            wrapper.appendChild(canvas);
            wrapper.appendChild(fxCanvas);
        }

        socket.on('waiting_in_lobby', () => {
            document.getElementById('welcomeMsg').innerText = "Waiting for the Host to start...";
        });

        // Update the game_start listener to accept the history
        socket.on('game_start', (data) => {
            if (!data.sector) {
                document.getElementById('welcomeMsg').innerText = "Canvas is fully assigned!";
                return;
            }

            mySector = data.sector;
            document.getElementById('welcomeMsg').innerText = `Sector ${mySector.id} Assigned!`;

            const screenWidth = window.innerWidth - 60; 
            cellSize = Math.floor(screenWidth / mySector.bounds.width);
            if (cellSize > 40) cellSize = 40; 

            canvas.width = mySector.bounds.width * cellSize;
            canvas.height = mySector.bounds.height * cellSize;
            fxCanvas.width = canvas.width;
            fxCanvas.height = canvas.height;
            
            canvas.style.border = "4px solid #a8e6cf";
            canvas.style.borderRadius = "10px";
            canvas.style.marginTop = "20px";
            canvas.style.imageRendering = "pixelated"; 

            drawHiddenGrid();
            requestAnimationFrame(animateFX);

            // NEW: Draw the history instantly!
            data.history.forEach(p => {
                // Translate the absolute master coordinate back to the phone's local grid
                const localX = p.x - mySector.bounds.minX;
                const localY = p.y - mySector.bounds.minY;
                
                // Reveal it, but tell the function NOT to emit it back to the server
                revealPixel(localX, localY, p.color, false); 
            });
        });

        document.getElementById('nextSectorBtn').addEventListener('click', () => {
            // Hide the button
            document.getElementById('nextSectorBtn').style.display = 'none';
            
            // THE FIX: Completely wipe all state variables so the new sector is a blank slate
            finishedCells.clear(); 
            tapCounts = {}; 
            mintProgress = {};
            activeMintCell = null;
            clearInterval(activeInterval);

            // Clear the canvases
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            if(typeof fxCtx !== 'undefined') fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
            
            // Ask the server for more!
            socket.emit('request_next_sector');
        });

        // If the server says there are no sectors left
        socket.on('canvas_complete', () => {
            document.getElementById('welcomeMsg').innerText = "All sectors claimed! Look at the projector!";
            document.getElementById('canvasWrapper').style.display = 'none';
            document.getElementById('nextSectorBtn').style.display = 'none';
        });

        function drawProofOfConcept() {
            for (let y = 0; y < mySector.bounds.height; y++) {
                for (let x = 0; x < mySector.bounds.width; x++) {
                    const hexColor = mySector.pixels[y][x];
                    
                    ctx.fillStyle = hexColor;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    
                    ctx.strokeStyle = "rgba(0,0,0,0.1)";
                    ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }
        }

        let paintedPixels = 0;
        
        // 1. Draw the hidden grid first
        function drawHiddenGrid() {
            for (let y = 0; y < mySector.bounds.height; y++) {
                for (let x = 0; x < mySector.bounds.width; x++) {
                    
                    const targetColor = mySector.pixels[y][x];
                    const flavor = getFlavorType(targetColor);
                    const cellKey = `${x},${y}`;

                    if (flavor === 'neutral') {
                        // AUTO-REVEAL: Paint it fully and lock it so they can't interact with it
                        ctx.fillStyle = targetColor;
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        finishedCells.add(cellKey);
                    } else {
                        // GAMEPLAY PIXEL: Draw the white background
                        ctx.fillStyle = "#ffffff"; 
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        
                        // DRAW THE HINT: A faint 20% opacity circle in the middle
                        ctx.fillStyle = targetColor;
                        ctx.globalAlpha = 0.2; 
                        ctx.beginPath();
                        ctx.arc((x * cellSize) + (cellSize / 2), (y * cellSize) + (cellSize / 2), cellSize / 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0; // Reset alpha back to normal
                    }
                    
                    // Draw the subtle grid line over everything
                    ctx.strokeStyle = "rgba(0,0,0,0.1)"; 
                    ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }
            checkSectorComplete();
        }

        // Call this inside socket.on('game_start') instead of drawProofOfConcept()
        // drawHiddenGrid();

        // 2. The Game Logic
        let activeInterval; // Replaces pressTimer
        let tapCounts = {}; 
        let mintProgress = {}; // NEW: Saves partial progress for mint holds
        let activeMintCell = null; 
        let finishedCells = new Set(); 

        function getFlavorType(hex) {
            const color = hex.toLowerCase();
            const mintColors = ['#d4edda', '#a8e6cf', '#56b896'];
            const chocoColors = ['#8d6e63', '#5d4037', '#3e2723'];
            
            if (mintColors.includes(color)) return 'mint';
            if (chocoColors.includes(color)) return 'chocolate';

            return 'neutral';
        }

        

        // Draws the cell based on how much progress they've made
        function drawMintProgress(x, y, progress, isActive) {
            const fillHeight = (progress / 1000) * cellSize; // 1000ms = 1 second
            
            // Draw background
            ctx.fillStyle = isActive ? "#e0f7fa" : "#ffffff";
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            
            // Draw the rising "liquid" progress
            ctx.fillStyle = isActive ? "#a8e6cf" : "rgba(168, 230, 207, 0.5)"; 
            ctx.fillRect(x * cellSize, (y * cellSize) + (cellSize - fillHeight), cellSize, fillHeight);
            
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }

        function resetCell(x, y) {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }

        canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); });

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault(); 
            
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);

            if (x < 0 || x >= mySector.bounds.width || y < 0 || y >= mySector.bounds.height) return;

            const cellKey = `${x},${y}`;
            if (finishedCells.has(cellKey)) return; // Block touches on finished cells

            clearInterval(activeInterval); // Clear any running intervals
            
            // If they were holding a different mint cell, pause its visual state
            if (activeMintCell && activeMintCell.key !== cellKey) {
                drawMintProgress(activeMintCell.x, activeMintCell.y, mintProgress[activeMintCell.key], false);
            }

            const targetColor = mySector.pixels[y][x];
            const flavor = getFlavorType(targetColor);

            if (flavor === 'mint') {
                activeMintCell = { x, y, key: cellKey };
                if (!mintProgress[cellKey]) mintProgress[cellKey] = 0;

                // Loop every 50ms to accumulate time and draw the rising liquid
                activeInterval = setInterval(() => {
                    mintProgress[cellKey] += 50; 
                    
                    drawMintProgress(x, y, mintProgress[cellKey], true);

                    // Reached 1 second (1000ms)!
                    if (mintProgress[cellKey] >= 1000) {
                        clearInterval(activeInterval);
                        revealPixel(x, y, targetColor);
                        activeMintCell = null;
                    }
                }, 50);

            } else {
                // CHOCOLATE LOGIC
                if (!tapCounts[cellKey]) tapCounts[cellKey] = 0;
                tapCounts[cellKey]++;
                
                ctx.fillStyle = "#f5ece6"; 
                ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                
                setTimeout(() => {
                    if (tapCounts[cellKey] < 3 && !finishedCells.has(cellKey)) {
                        resetCell(x, y);
                    }
                }, 100);

                if (tapCounts[cellKey] >= 3) {
                    revealPixel(x, y, targetColor);
                }
            }
        });

        function cancelMintHold() {
            clearInterval(activeInterval);
            // If they lift off early, pause the liquid and make it faded
            if (activeMintCell) {
                drawMintProgress(activeMintCell.x, activeMintCell.y, mintProgress[activeMintCell.key], false);
                activeMintCell = null;
            }
        }
        
        window.addEventListener('pointerup', cancelMintHold);
        window.addEventListener('pointercancel', cancelMintHold);
        window.addEventListener('touchend', cancelMintHold); 

        function revealPixel(x, y, color, shouldEmit = true) {
            const cellKey = `${x},${y}`;
            if (finishedCells.has(cellKey)) return; 
            finishedCells.add(cellKey); 

            ctx.fillStyle = color;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
            
            paintedPixels++;
            
            // NEW: Trigger the visual juice!
            // We only want the explosion when the user actually paints it, 
            // not when history is loaded on boot.
            if (shouldEmit) {
                const flavor = getFlavorType(color);
                spawnParticles(x, y, flavor);
                
                const absoluteX = mySector.bounds.minX + x;
                const absoluteY = mySector.bounds.minY + y;
                socket.emit('pixel_painted', { x: absoluteX, y: absoluteY, color: color });
            }
            checkSectorComplete();
        }
        
        socket.on('massive_reveal', (missingPixels) => {
            if (!mySector) return;
            
            // Loop through the missing pixels and only draw the ones that belong to this phone
            missingPixels.forEach(p => {
                if (p.x >= mySector.bounds.minX && p.x < mySector.bounds.minX + mySector.bounds.width &&
                    p.y >= mySector.bounds.minY && p.y < mySector.bounds.minY + mySector.bounds.height) {
                    
                    const localX = p.x - mySector.bounds.minX;
                    const localY = p.y - mySector.bounds.minY;
                    
                    // Reveal it, but don't emit it back to the server (false flag)
                    revealPixel(localX, localY, p.color, false);
                }
            });
            
            document.getElementById('welcomeMsg').innerText = "Canvas Revealed! 🎉";
        });
        
        // --- PARTICLE ENGINE LOGIC ---
        function spawnParticles(x, y, flavor) {
            // Find the exact center of the tapped square
            const centerX = (x * cellSize) + (cellSize / 2);
            const centerY = (y * cellSize) + (cellSize / 2);
            
            // Use our specific Kawaii hex codes for the effects
            const colors = flavor === 'mint' 
                ? ['#d4edda', '#ffffff', '#e0f7fa'] // Icy whites and pale mint
                : ['#8d6e63', '#5d4037', '#3e2723']; // Milk and dark chocolate
                
            const particleCount = flavor === 'mint' ? 20 : 15;

            for(let i = 0; i < particleCount; i++) {
                particles.push({
                    x: centerX,
                    y: centerY,
                    // Give them random burst velocities
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.0, // Opacity starts at 100%
                    decay: 0.02 + Math.random() * 0.04, // How fast they fade
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * (cellSize / 5) + 2
                });
            }
        }

        function animateFX() {
            // Clear the transparent canvas every frame
            fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
            
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                
                if(p.life <= 0) {
                    particles.splice(i, 1); // Delete dead particles
                } else {
                    fxCtx.globalAlpha = p.life;
                    fxCtx.fillStyle = p.color;
                    fxCtx.beginPath();
                    fxCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    fxCtx.fill();
                }
            }
            fxCtx.globalAlpha = 1.0; // Reset alpha
            requestAnimationFrame(animateFX);
        }
        
        function checkSectorComplete() {
            if (!mySector) return;
            const totalCells = mySector.bounds.width * mySector.bounds.height;
            
            // If every cell in this chunk is locked, show the button!
            if (finishedCells.size >= totalCells) {
                document.getElementById('nextSectorBtn').style.display = 'block';
            }
        }
    </script>
</body>
</html>
